<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum program</title>
</head>
<body>
    <h2>Sum Calculator</h2>
<button onclick="startProgram()">Start Input</button>
<script>
function startProgram() {
    let sum = 0;
    while (true) {
        let input = prompt("Enter a number (0 to stop):");
        if (input === null) {
            alert("Program cancelled");
            return;
        }
        let num = Number(input);
        if (isNaN(num)) {
            alert("Please enter a valid number!");
            continue;
        }
        if (num === 0) {
            break;
        }
        sum += num;
    }
    alert("Total Sum is: " + sum);
}
</script>
</body>
</html>
