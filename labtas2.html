<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question program</title>
</head>
<body>
    <h2>Question Answer Program</h2>
<button onclick="askQuestion()">Start</button>
<script>
function askQuestion() {
    let answer = prompt("What is 5 + 3 ?");
    if (answer === null) {
        alert("You cancelled the program.");
        return;
    }
    if (Number(answer) === 8) {
        alert(" Correct Answer! Well done.");
    } else {
        alert(" Wrong Answer! Try again.");
    }
}
</script>
</body>
</html>
